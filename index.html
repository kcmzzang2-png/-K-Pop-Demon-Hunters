<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Pop Demon Hunter: Golden Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@400;700&display=swap');

        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-purple: #bc13fe;
            --gold: #ffd700;
            --hp-green: #00ff88;
            --sp-yellow: #ffea00;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif;
            color: white;
        }

        #game-container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #000;
        }

        canvas { display: block; background: #000; cursor: crosshair; }

        #setup-overlay {
            position: absolute; inset: 0; 
            background-size: cover;
            background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; text-align: center; padding: 20px;
            transition: background-image 0.5s ease-in-out;
        }

        .loader {
            width: 70px; height: 70px; border: 6px solid #111;
            border-top: 6px solid var(--neon-pink); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 25px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .status-msg { 
            font-size: 24px; font-weight: 900; margin-bottom: 15px; 
            color: white; text-shadow: 0 0 15px var(--neon-blue); 
            background: rgba(0,0,0,0.6); padding: 15px 40px; border-radius: 50px;
            max-width: 80%;
        }

        #hud {
            position: absolute; top: 25px; left: 25px; right: 240px;
            pointer-events: none; display: flex; justify-content: space-between;
            font-weight: bold; z-index: 10;
        }

        #pause-btn {
            position: absolute; top: 25px; right: 25px;
            padding: 12px 28px; background: rgba(0,0,0,0.85);
            border: 2px solid var(--neon-blue); color: var(--neon-blue);
            cursor: pointer; font-family: 'Orbitron'; z-index: 100;
            transition: 0.2s; border-radius: 4px; text-transform: uppercase; font-weight: 700;
        }
        #pause-btn:hover { background: var(--neon-blue); color: #000; }

        .bottom-ui {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            pointer-events: none; z-index: 20;
        }

        .ult-container {
            width: 400px; height: 26px; background: rgba(0,0,0,0.8);
            border: 2px solid var(--neon-purple); border-radius: 20px; overflow: hidden;
            position: relative;
        }

        #ult-fill {
            width: 0%; height: 100%; background: linear-gradient(90deg, #bc13fe, #ff00ff, #00ffff);
            transition: width 0.3s;
        }

        #boss-hp-container {
            position: absolute; top: 85px; left: 50%; transform: translateX(-50%);
            width: 85%; height: 48px; background: rgba(0,0,0,0.9);
            border: 3px solid #fff; display: none; border-radius: 6px; overflow: hidden;
            z-index: 200;
        }
        #boss-hp-fill { 
            width: 100%; height: 100%; 
            background: linear-gradient(to right, #990000 0%, #ff0000 50%, #ff6666 100%); 
            transition: width 0.1s linear; 
        }
        #boss-name { 
            position: absolute; width: 100%; text-align: center; 
            font-size: 24px; line-height: 48px; font-weight: 900; 
            text-transform: uppercase; color: #fff; text-shadow: 2px 2px 0 #000;
            top: 0;
        }
        
        #kill-counter {
            position: absolute; top: 85px; right: 25px; font-size: 18px; 
            color: var(--gold); font-weight: 900; text-shadow: 0 0 10px #000;
        }

        #item-notif {
            position: absolute; top: 160px; left: 50%; transform: translateX(-50%);
            font-size: 24px; color: var(--hp-green); font-weight: 900;
            text-shadow: 0 0 20px #000; display: none; z-index: 150;
        }

        .btn-primary {
            padding: 18px 60px; font-size: 22px; background: rgba(0,0,0,0.8);
            color: #fff; border: 3px solid var(--neon-pink);
            cursor: pointer; font-family: 'Orbitron'; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 3px; border-radius: 8px;
        }
        .btn-primary:hover { background: var(--neon-pink); color: black; box-shadow: 0 0 40px var(--neon-pink); }

        #pause-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.8);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 500;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <button id="pause-btn" onclick="togglePause()">PAUSE (P)</button>

    <div id="hud">
        <div style="color: var(--hp-green); font-size: 26px; border: 3px solid var(--hp-green); padding: 8px 20px; border-radius: 8px; background: rgba(0,0,0,0.7);">HP: <span id="player-hp">100</span></div>
        <div id="stage-info" style="color: var(--gold); font-size: 36px; font-weight:900; letter-spacing: 6px; text-shadow: 0 0 20px var(--gold);">STAGE 1</div>
        <div style="color: var(--neon-blue); font-size: 26px; border: 3px solid var(--neon-blue); padding: 8px 20px; border-radius: 8px; background: rgba(0,0,0,0.7);">SCORE: <span id="score-val">0</span></div>
    </div>
    
    <div id="kill-counter">HUNTING: <span id="kill-val">0</span> / 15</div>

    <div id="boss-hp-container">
        <div id="boss-hp-fill"></div>
        <div id="boss-name">BOSS DETECTED</div>
    </div>

    <div id="item-notif">+30 HP RECOVERED!</div>

    <div class="bottom-ui">
        <div class="instruction">[ ARROW KEYS ] MOVE | [ SPACE ] MELODY SHOT | [ X ] NEON SUPERNOVA</div>
        <div class="ult-container">
            <div id="ult-fill"></div>
            <div id="ult-label" style="position: absolute; width: 100%; text-align: center; font-size: 12px; line-height: 24px; font-weight: 900; color:#fff; text-shadow: 1px 1px 3px #000;">NEON SUPERNOVA</div>
        </div>
        <!-- 제작자 정보 추가 -->
        <div style="font-size: 14px; margin-top: 5px; color: rgba(255,255,255,0.6); font-family: 'Noto Sans KR'; letter-spacing: 1px;">만든이: 문화고등학교 티처킴</div>
    </div>

    <div id="setup-overlay">
        <div id="loader-icon" class="loader"></div>
        <div id="status-msg" class="status-msg">갤럭시 헌터 시스템 정렬 중...</div>
        <div class="btn-group" id="lobby-ui" style="display: none;">
            <button id="start-btn" class="btn-primary" onclick="startGame()">START MISSION</button>
        </div>
    </div>

    <div id="pause-overlay">
        <h1 style="font-size: 48px; color: var(--neon-blue); margin-bottom: 20px;">PAUSED</h1>
        <button class="btn-primary" onclick="togglePause()">RESUME</button>
    </div>
</div>

<script>
const apiKey = ""; 
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const setupOverlay = document.getElementById('setup-overlay');
const pauseOverlay = document.getElementById('pause-overlay');
const statusMsg = document.getElementById('status-msg');
const lobbyUi = document.getElementById('lobby-ui');

function resizeCanvas() {
    canvas.width = 1200;
    canvas.height = 800;
}
resizeCanvas();

const assets = { player: null, bosses: [], enemy: null, background: null, screens: { lobby: null, fail: null, success: null }, projectile: null };
const masks = { player: null, bosses: [], enemy: null };

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, duration, type = 'square', volume = 0.05) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq/5, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}

async function removeBackground(img) {
    if (!img) return null;
    const off = document.createElement('canvas');
    off.width = img.width; off.height = img.height;
    const octx = off.getContext('2d');
    octx.drawImage(img, 0, 0);
    const imgData = octx.getImageData(0, 0, off.width, off.height);
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2];
        const brightness = (r + g + b) / 3;
        const diff = Math.max(Math.abs(r-g), Math.abs(g-b), Math.abs(b-r));
        if (brightness > 230 || (brightness > 190 && diff < 15)) data[i+3] = 0;
    }
    octx.putImageData(imgData, 0, 0);
    const resImg = new Image();
    resImg.src = off.toDataURL();
    await new Promise(r => resImg.onload = r);
    return resImg;
}

async function createWhiteMask(img) {
    if (!img) return null;
    const off = document.createElement('canvas');
    off.width = img.width; off.height = img.height;
    const octx = off.getContext('2d');
    octx.drawImage(img, 0, 0);
    octx.globalCompositeOperation = 'source-in';
    octx.fillStyle = 'white';
    octx.fillRect(0, 0, off.width, off.height);
    const resImg = new Image();
    resImg.src = off.toDataURL();
    await new Promise(r => resImg.onload = r);
    return resImg;
}

async function generateAsset(prompt) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
    const delays = [1000, 2000, 4000, 8000, 16000];

    for (let i = 0; i <= delays.length; i++) {
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    instances: { prompt: prompt }, 
                    parameters: { sampleCount: 1 } 
                })
            });

            if (!response.ok) {
                const errorData = await response.text();
                throw new Error(`HTTP ${response.status}: ${errorData}`);
            }

            const json = await response.json();
            if (json.predictions?.[0]?.bytesBase64Encoded) {
                const img = new Image();
                img.src = `data:image/png;base64,${json.predictions[0].bytesBase64Encoded}`;
                await new Promise((resolve, reject) => {
                    img.onload = resolve;
                    img.onerror = () => reject(new Error("Image Load Failed"));
                });
                return img;
            } else {
                throw new Error("No Data");
            }
        } catch (e) {
            if (i === delays.length) return null;
            await new Promise(res => setTimeout(res, delays[i]));
        }
    }
    return null;
}

async function initAssets() {
    try {
        statusMsg.innerText = "환상적인 갤럭시 은하수 렌더링 중...";
        assets.background = await generateAsset("Cinematic 3D Milky Way galaxy, colorful nebula gas, deep space masterpiece");

        statusMsg.innerText = "전용 테마 화면 동기화 중...";
        // 세 캐릭터(루미, 하나, 미나)의 외형을 모든 화면에 공통적으로 적용
        const teamBaseDesc = "Three K-pop female hunters standing together. Center: Lumi with long purple ponytail and yellow tactical jacket. Left: Hana with short black hair buns in blue crop top and baggy black pants. Right: Mina with long red hair in black t-shirt and yellow skirt holding a glowing energy spear.";
        
        const lobbyPrompt = `Cinematic masterpiece 3D render of ${teamBaseDesc} standing heroically in space. High detail, 8k resolution, space station background.`;
        const failPrompt = `Cinematic 3D artwork of the same trio: ${teamBaseDesc} looking defeated and exhausted on a dark space battlefield. Cinematic tragedy, sharp facial features, highly detailed, 8k resolution.`;
        const successPrompt = `Cinematic 3D artwork of the same trio: ${teamBaseDesc} cheering and celebrating victory, triumphant pose on space platform, vibrant colorful galaxy, high resolution, 8k.`;

        assets.screens.lobby = await generateAsset(lobbyPrompt);
        assets.screens.fail = await generateAsset(failPrompt);
        assets.screens.success = await generateAsset(successPrompt);

        if (assets.screens.lobby) setupOverlay.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)), url('${assets.screens.lobby.src}')`;

        statusMsg.innerText = "루미(Lumi) 비주얼 업그레이드 중...";
        const playerImg = await generateAsset("Masterpiece 3D render of a K-pop female hunter game character, vibrant purple hair tied in a high long ponytail, wearing a stylish yellow and black crop bomber jacket with detailed colorful embroidery on the sleeves, tactical black pants, aiming a futuristic tech pistol toward the right side in a dynamic shooting pose, full body shot, feet fully visible, standing on white ground, white background, high resolution, 8k");
        assets.player = await removeBackground(playerImg);
        masks.player = await createWhiteMask(assets.player);

        statusMsg.innerText = "음표 미사일 정밀 보정 중...";
        const projectileImg = await generateAsset("Single isolated futuristic eighth note silhouette, glowing neon yellow energy, sharp clean vector edges, no background symbols, no arrows, high resolution, white background");
        assets.projectile = await removeBackground(projectileImg);

        statusMsg.innerText = "에너미 데이터 구성 중...";
        const enemyImg = await generateAsset("Cybernetic sphere core, glowing red eye, metallic, white background");
        assets.enemy = await removeBackground(enemyImg);
        masks.enemy = await createWhiteMask(assets.enemy);

        statusMsg.innerText = "보스 유닛 설계 중...";
        const bPrompts = [
            "Menacing Blue Dokkaebi demon, glowing eyes, white background",
            "Golden Reaper with energy scythe, celestial golden armor, white background",
            "Grand King Gwima, red demonic armor, massive black horns, white background"
        ];
        for(let i=0; i<3; i++) {
            const bImg = await generateAsset(bPrompts[i]);
            assets.bosses[i] = await removeBackground(bImg);
            masks.bosses[i] = await createWhiteMask(assets.bosses[i]);
        }

        document.getElementById('loader-icon').style.display = 'none';
        lobbyUi.style.display = 'flex';
        statusMsg.innerText = "준비 완료. 사냥 프로토콜을 실행하십시오.";
    } catch (e) { 
        statusMsg.innerText = "치명적 오류: 네트워크 상태를 확인해주세요.";
    }
}

let player = { x: 100, y: 350, hp: 100, maxHp: 100, size: 110 };
let isPaused = false, gameRunning = false, currentStage = 1, stageKills = 0;
const killsPerStage = 15;
let score = 0, lastShot = 0, lastUlt = Date.now() - 20000;
let projectiles = [], enemies = [], items = [], boss = null, screenShake = 0, flash = 0;
const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, Space: false, KeyX: false };

function togglePause() {
    if (!gameRunning) return;
    isPaused = !isPaused;
    pauseOverlay.style.display = isPaused ? 'flex' : 'none';
    if (!isPaused) requestAnimationFrame(loop);
}

function startGame() {
    player.hp = 100; player.x = 100; player.y = 350;
    currentStage = 1; stageKills = 0; score = 0;
    projectiles = []; enemies = []; items = []; boss = null;
    gameRunning = true; isPaused = false;
    setupOverlay.style.display = 'none'; pauseOverlay.style.display = 'none';
    document.getElementById('boss-hp-container').style.display = 'none';
    document.getElementById('kill-counter').style.visibility = 'visible';
    updateHUD(); requestAnimationFrame(loop);
}

function updateHUD() {
    document.getElementById('player-hp').innerText = Math.floor(player.hp);
    document.getElementById('score-val').innerText = score;
    document.getElementById('kill-val').innerText = stageKills;
    document.getElementById('stage-info').innerText = `STAGE ${currentStage}`;
    document.getElementById('ult-fill').style.width = Math.min(100, ((Date.now() - lastUlt) / 20000) * 100) + "%";
    if (boss) document.getElementById('boss-hp-fill').style.width = (boss.hp / boss.maxHp * 100) + "%";
}

function spawnBoss(stage) {
    const data = [
        { name: "BLUE DOKKAEBI", hp: 15000, size: 240 },
        { name: "GOLDEN REAPER", hp: 40000, size: 300 },
        { name: "GRAND DEVIL GWIMA", hp: 150000, size: 320 }
    ][stage-1];
    boss = { 
        name: data.name, hp: data.hp, maxHp: data.hp, 
        x: 1300, y: 200, size: data.size, timer: 0, hitFlash: 0,
        vx: stage === 2 ? -7 : -5, vy: stage === 2 ? 3 : 2, targetY: 300
    };
    document.getElementById('boss-name').innerText = boss.name;
    document.getElementById('boss-hp-container').style.display = 'block';
    document.getElementById('kill-counter').style.visibility = 'hidden';
}

function loop() {
    if (!gameRunning || isPaused) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    const moveSpeed = 13;
    if (keys.ArrowUp && player.y > 0) player.y -= moveSpeed;
    if (keys.ArrowDown && player.y < canvas.height - player.size) player.y += moveSpeed;
    if (keys.ArrowLeft && player.x > 0) player.x -= moveSpeed;
    if (keys.ArrowRight && player.x < 600) player.x += moveSpeed;

    if (keys.Space && Date.now() - lastShot > 110) {
        projectiles.push({ x: player.x + player.size * 0.88, y: player.y + player.size * 0.35, vx: 32, vy: 0, isPlayer: true, color: '#ffd700', size: 35 });
        playSound(650, 0.08, 'sine'); lastShot = Date.now();
    }
    if (keys.KeyX && Date.now() - lastUlt > 20000) useUltimate();

    if (!boss && stageKills < killsPerStage && Math.random() < 0.075) {
        enemies.push({ x: 1300, y: Math.random() * (canvas.height - 100), hp: 4 + currentStage*2, speed: 7.5 + currentStage, size: 75, hitFlash: 0 });
    }
    if (!boss && stageKills >= killsPerStage) spawnBoss(currentStage);

    for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i]; p.x += p.vx; p.y += p.vy;
        if (p.isPlayer) {
            for (let j = enemies.length - 1; j >= 0; j--) {
                const e = enemies[j];
                if (Math.hypot(p.x - (e.x + e.size/2), p.y - (e.y + e.size/2)) < e.size/2) {
                    e.hp -= 2; e.hitFlash = 6; p.active = false;
                    if (e.hp <= 0) { 
                        score += 200; stageKills++; 
                        if (Math.random() < 0.06) { 
                            const type = Math.random() < 0.5 ? 'hp' : 'sp';
                            items.push({ x: e.x, y: e.y, active: true, type: type }); 
                        }
                    }
                    break;
                }
            }
            if (p.active !== false && boss && Math.hypot(p.x - (boss.x + boss.size/2), p.y - (boss.y + boss.size/2)) < boss.size/2.4) {
                boss.hp -= (150 + currentStage*40); boss.hitFlash = 5; p.active = false; score += 100;
                screenShake = 3;
                if (Math.random() < 0.03) {
                    const type = Math.random() < 0.5 ? 'hp' : 'sp';
                    items.push({ x: boss.x + Math.random() * boss.size, y: boss.y + Math.random() * boss.size, active: true, type: type });
                }
            }
        } else {
            if (Math.hypot(p.x - (player.x + player.size/2), p.y - (player.y + player.size/2)) < player.size/3.5) {
                player.hp -= (currentStage === 3 ? 15 : 10); p.active = false; screenShake = 15;
            }
        }
        if (p.active === false || p.x < -100 || p.x > 1400) projectiles.splice(i, 1);
    }

    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i]; e.x -= e.speed; if (e.hitFlash > 0) e.hitFlash--;
        if (Math.hypot(e.x - (player.x + player.size/2), e.y - (player.y + player.size/2)) < (player.size + e.size)/2.8) { player.hp -= 25; e.hp = 0; screenShake = 22; }
        if (e.hp <= 0 || e.x < -100) enemies.splice(i, 1);
    }

    if (boss) {
        boss.timer++; 
        if (boss.hitFlash > 0) boss.hitFlash--; 
        if (boss.x > 750) {
            boss.x += boss.vx;
        } else {
            boss.vx = currentStage === 2 ? (3 + Math.random() * 7) : (2 + Math.random() * 5);
            boss.x += boss.vx;
        }
        if (boss.x > 1000) boss.vx = -(currentStage === 2 ? 4 : 2 + Math.random() * 5);
        boss.y += boss.vy;
        if (boss.y < 50 || boss.y > canvas.height - boss.size - 50) {
            boss.vy *= -1;
        }
        if (currentStage === 1) { 
            if (boss.timer % 35 === 0) {
                for(let i=0; i<4; i++) {
                    const angle = (i * Math.PI / 2) + boss.timer*0.12;
                    projectiles.push({ x: boss.x + boss.size/2, y: boss.y + boss.size/2, vx: Math.cos(angle)*13, vy: Math.sin(angle)*13, isPlayer: false, color: '#00ffff' });
                }
            }
            if (boss.timer % 70 === 0) fireAtPlayer(boss.x, boss.y + boss.size/2, 19, '#ffffff');
        } 
        else if (currentStage === 2) { 
            if (boss.timer % 60 === 0) {
                for(let i=-1; i<=1; i++) {
                    projectiles.push({ x: boss.x, y: boss.y + boss.size/2, vx: -16, vy: i*6, isPlayer: false, color: '#ffd700' });
                }
            }
            if (boss.timer % 100 === 50) {
                for(let i=0; i<5; i++) fireAtPlayer(boss.x, boss.y + boss.size/2, 14 + Math.random()*10, '#ff0055');
            }
        } 
        else if (currentStage === 3) {
            if (boss.timer % 75 === 0) {
                for(let i=0; i<16; i++) {
                    const angle = (i * Math.PI * 2 / 16) + boss.timer*0.15;
                    projectiles.push({ x: boss.x + boss.size/2, y: boss.y + boss.size/2, vx: Math.cos(angle)*11, vy: Math.sin(angle)*11, isPlayer: false, color: '#bc13fe' });
                }
            }
            if (boss.timer % 110 > 90 && boss.timer % 5 === 0) fireAtPlayer(boss.x, boss.y + boss.size/2, 22, '#ff00ff');
            if (boss.timer % 200 === 150) {
                for(let i=0; i<10; i++) {
                    projectiles.push({ x: boss.x, y: (i * 80), vx: -10, vy: (Math.sin(boss.timer + i) * 3), isPlayer: false, color: '#ffea00' });
                }
            }
        }

        if (boss.hp <= 0) { 
            score += 300000; flash = 1.5; currentStage++; boss = null; stageKills = 0; 
            document.getElementById('boss-hp-container').style.display = 'none'; 
            document.getElementById('kill-counter').style.visibility = 'visible'; 
            if (currentStage > 3) endGame(true); 
        }
    }

    for (let i = items.length - 1; i >= 0; i--) {
        const it = items[i]; it.x -= 7;
        if (Math.hypot(it.x - (player.x + player.size/2), it.y - (player.y + player.size/2)) < player.size/2.5) {
            if (it.type === 'hp') {
                player.hp = Math.min(100, player.hp + 30);
                showItemNotif("+30 HP RECOVERED!", '#00ff88');
            } else {
                lastUlt -= 6000; 
                showItemNotif("+30 SP ENERGY CHARGED!", '#ffea00');
            }
            it.active = false;
        }
        if (it.active === false || it.x < -100) items.splice(i, 1);
    }
    updateHUD(); if (screenShake > 0) screenShake *= 0.85; if (flash > 0) flash -= 0.05;
    if (player.hp <= 0) endGame(false);
}

function fireAtPlayer(x, y, speed, color) {
    const dx = (player.x + player.size/2) - x, dy = (player.y + player.size/2) - y, dist = Math.hypot(dx, dy);
    projectiles.push({ x: x, y: y, vx: (dx/dist)*speed, vy: (dy/dist)*speed, isPlayer: false, color: color });
}

function useUltimate() {
    lastUlt = Date.now(); screenShake = 120; flash = 1.4;
    for (let i = enemies.length - 1; i >= 0; i--) { enemies[i].hp = 0; score += 1000; }
    if (boss) { boss.hp -= boss.maxHp * 0.15; boss.hitFlash = 25; }
    playSound(150, 1.6, 'sawtooth', 0.2);
}

function showItemNotif(text, color) { 
    const el = document.getElementById('item-notif'); 
    el.innerText = text;
    el.style.color = color;
    el.style.display = 'block'; 
    setTimeout(() => el.style.display = 'none', 1600); 
}

function drawMusicalNote(x, y, color, size = 18) {
    ctx.save(); ctx.translate(x, y); ctx.fillStyle = color;
    ctx.beginPath(); ctx.ellipse(0, size, size*0.7, size*0.5, Math.PI/4, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(size*0.4, -size*0.5, size*0.2, size*1.5);
    ctx.beginPath(); ctx.moveTo(size*0.4, -size*0.5); ctx.quadraticCurveTo(size*1.2, -size*0.2, size*1.2, size*0.5); ctx.lineWidth = size*0.2; ctx.strokeStyle = color; ctx.stroke();
    ctx.restore();
}

function drawChar(img, mImg, x, y, size, flashFrames) {
    if (img) {
        ctx.drawImage(img, Math.floor(x), Math.floor(y), size, size);
    }
    if (flashFrames > 0 && mImg) {
        ctx.save(); ctx.globalAlpha = Math.min(0.9, flashFrames / 8);
        ctx.drawImage(mImg, Math.floor(x), Math.floor(y), size, size); ctx.restore();
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.save();
    if (screenShake > 0.5) ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);

    if (assets.background) {
        ctx.drawImage(assets.background, 0, 0, canvas.width, canvas.height);
    }
    ctx.fillStyle = "rgba(0, 0, 0, 0.4)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    for(let i=0; i<items.length; i++) {
        const it = items[i]; 
        ctx.fillStyle = it.type === 'hp' ? '#00ff88' : '#ffea00'; 
        ctx.beginPath(); ctx.arc(it.x, it.y, 22, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.font = 'bold 16px Orbitron'; 
        ctx.fillText(it.type.toUpperCase(), it.x-14, it.y+6);
    }

    if (assets.player) {
        ctx.save(); ctx.drawImage(assets.player, player.x, player.y, player.size, player.size);
        ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = 0.35;
        ctx.drawImage(assets.player, player.x, player.y, player.size, player.size); ctx.restore();
    } else {
        ctx.fillStyle = 'purple'; ctx.fillRect(player.x, player.y, player.size, player.size);
    }

    if (boss) {
        const bImg = assets.bosses[currentStage-1], mImg = masks.bosses[currentStage-1];
        if (bImg) {
            ctx.save(); drawChar(bImg, mImg, boss.x, boss.y, boss.size, boss.hitFlash);
            ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = 0.2;
            ctx.drawImage(bImg, Math.floor(boss.x), Math.floor(boss.y), boss.size, boss.size); ctx.restore();
        } else {
            ctx.fillStyle = 'red'; ctx.fillRect(boss.x, boss.y, boss.size, boss.size);
        }
    }

    for(let i=0; i<enemies.length; i++) {
        const e = enemies[i]; 
        if (assets.enemy && masks.enemy) {
            drawChar(assets.enemy, masks.enemy, e.x, e.y, e.size, e.hitFlash);
        } else {
            ctx.fillStyle = 'orange'; ctx.beginPath(); ctx.arc(e.x+e.size/2, e.y+e.size/2, e.size/2, 0, Math.PI*2); ctx.fill();
        }
    }

    for(let i=0; i<projectiles.length; i++) {
        const p = projectiles[i];
        if (p.isPlayer) {
            if (assets.projectile) {
                ctx.drawImage(assets.projectile, p.x - p.size/2, p.y - p.size/2, p.size, p.size);
            } else {
                drawMusicalNote(p.x, p.y, p.color, 22);
            }
        } else {
            ctx.save(); ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 16, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(p.x-4, p.y-4, 8, 0, Math.PI*2); ctx.fill(); ctx.restore();
        }
    }

    if (flash > 0) { ctx.fillStyle = `rgba(255,255,255,${flash})`; ctx.fillRect(0,0,canvas.width,canvas.height); }
    ctx.restore();
}

function endGame(win) {
    gameRunning = false; setupOverlay.style.display = 'flex';
    if (win) {
        statusMsg.innerText = "MISSION CLEAR: THE GALAXY IS SAFE!";
        if (assets.screens.success) setupOverlay.style.backgroundImage = `url('${assets.screens.success.src}')`;
    } else {
        statusMsg.innerText = "MISSION FAILED: HUNTER DOWN.";
        if (assets.screens.fail) setupOverlay.style.backgroundImage = `url('${assets.screens.fail.src}')`;
    }
    lobbyUi.style.display = 'flex';
}

window.onkeydown = e => { if (keys.hasOwnProperty(e.code)) { keys[e.code] = true; if (e.code === 'Space') e.preventDefault(); } if (e.code === 'KeyP') togglePause(); };
window.onkeyup = e => { if (keys.hasOwnProperty(e.code)) keys[e.code] = false; };
window.onload = initAssets;
</script>
